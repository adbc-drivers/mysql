name: mysql
services:
  test-service:
    image: mysql:9.7
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: db
      MYSQL_USER: my
      MYSQL_PASSWORD: password
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - 3306:3306
    volumes:
      - ./ci/docker/mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    user: "0:0"
    command: ["--config=/otel/collector.yaml"]
    ports:
      - 4318:4318
    volumes:
      - ./.otel:/otel

  mariadb:
    image: mariadb:12.2
    environment:
      MARIADB_ROOT_PASSWORD: "password"
      MARIADB_DATABASE: db
      MARIADB_USER: my
      MARIADB_PASSWORD: password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - 3307:3306

  databend:
    image: datafuselabs/databend
    environment:
      QUERY_DEFAULT_USER: root
      QUERY_DEFAULT_PASSWORD: ""
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo >/dev/tcp/127.0.0.1/3307"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - 3308:3307
